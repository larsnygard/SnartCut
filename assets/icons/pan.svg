<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Open hand: 4 finger columns + palm bar -->
  <!-- Index finger -->
  <rect x="4"    y="5.5" width="3"   height="9"   rx="1.5" fill="white"/>
  <!-- Middle finger -->
  <rect x="8"    y="3.5" width="3"   height="11"  rx="1.5" fill="white"/>
  <!-- Ring finger -->
  <rect x="12"   y="4.5" width="3"   height="10"  rx="1.5" fill="white"/>
  <!-- Pinky -->
  <rect x="16"   y="7"   width="2.5" height="7.5" rx="1.25" fill="white"/>
  <!-- Palm -->
  <rect x="3.5"  y="12"  width="15.5" height="7"  rx="2.5" fill="white"/>
</svg>
