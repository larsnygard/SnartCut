<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- S-curve: anchor at bottom-left and top-right -->
  <path d="M 4 20 C 8 8 16 16 20 4"
        fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Control handle lines (dashed) -->
  <line x1="4"  y1="20" x2="8"  y2="8"
        stroke="white" stroke-width="1" stroke-dasharray="2,2" opacity="0.55"/>
  <line x1="20" y1="4"  x2="16" y2="16"
        stroke="white" stroke-width="1" stroke-dasharray="2,2" opacity="0.55"/>
  <!-- Anchor points (filled) -->
  <circle cx="4"  cy="20" r="2"   fill="white"/>
  <circle cx="20" cy="4"  r="2"   fill="white"/>
  <!-- Control points (hollow) -->
  <circle cx="8"  cy="8"  r="1.6" fill="none" stroke="white" stroke-width="1.2"/>
  <circle cx="16" cy="16" r="1.6" fill="none" stroke="white" stroke-width="1.2"/>
</svg>
