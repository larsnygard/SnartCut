name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: snart-cut
            archive: snart-cut-linux-x86_64.tar.gz

          - target: aarch64-apple-darwin
            os: macos-14
            artifact: snart-cut
            archive: snart-cut-macos-aarch64.tar.gz

          - target: x86_64-apple-darwin
            os: macos-13
            artifact: snart-cut
            archive: snart-cut-macos-x86_64.tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-2022
            artifact: snart-cut.exe
            archive: snart-cut-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      # ── Linux dependencies ──────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libudev-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libpango1.0-dev

      # ── Build ───────────────────────────────────────────────────────────
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package (Linux / macOS) ─────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} .
          tar -czf ${{ matrix.archive }} ${{ matrix.artifact }} README.md LICENSE

      # ── Package (Windows) ───────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.artifact }}" .
          Compress-Archive -Path ${{ matrix.artifact }}, README.md, LICENSE `
            -DestinationPath ${{ matrix.archive }}

      # ── Upload artifact ─────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ── Create GitHub Release with all artifacts ────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
